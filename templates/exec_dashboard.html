<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="120"><!-- auto-refresh every 2 min for wall display -->
<title>DNV Compliance — Management Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0A0F1E;
  --surface: #111827;
  --surface2:#1A2234;
  --border:  #1E2D45;
  --text:    #E8ECF0;
  --muted:   #6B7280;
  --red:     #EF4444;
  --amber:   #F59E0B;
  --green:   #22C55E;
  --blue:    #3B82F6;
  --navy:    #1F3864;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-data: 'IBM Plex Mono', monospace;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-head); }

/* ── Shell ── */
#shell { min-height: 100vh; display: flex; flex-direction: column; }

/* ── Header ── */
#header {
  background: var(--navy);
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-brand { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
.header-brand span { font-size: 13px; font-weight: 400; opacity: 0.6; margin-left: 12px; font-family: var(--font-data); }
.header-right { text-align: right; font-size: 12px; opacity: 0.7; font-family: var(--font-data); }
.header-date { font-size: 14px; font-weight: 600; opacity: 1; color: #fff; }

/* ── Nav strip ── */
#nav-strip {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.nav-btn { font-family: var(--font-head); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; padding: 8px 14px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--muted); cursor: pointer; text-decoration: none; display: inline-block; transition: all .15s; }
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.action-btn { font-family: var(--font-head); font-size: 11px; font-weight: 600; padding: 5px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; text-decoration: none; }
.action-btn:hover { color: var(--blue); border-color: var(--blue); }
.action-btn.primary { border-color: var(--blue); color: var(--blue); background: rgba(37,99,235,0.06); }
#send-digest-btn:hover { color: var(--green); border-color: var(--green); }

/* ── Main content ── */
#content { flex: 1; padding: 24px 32px; overflow-y: auto; }

/* ── KPI row ── */
.kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 16px 14px;
  border-top: 4px solid transparent;
  position: relative;
}
.kpi-value { font-size: 48px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.kpi-sub { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--font-data); }

/* ── Section title ── */
.sec-title { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* ── Middle row ── */
.mid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }

/* ── Panel cards ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
}

/* ── Coverage bars ── */
.cov-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.cov-label { font-size: 12px; font-weight: 600; width: 120px; flex-shrink: 0; }
.cov-bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.cov-bar-fill { height: 8px; border-radius: 4px; transition: width .4s ease; }
.cov-count { font-family: var(--font-data); font-size: 12px; font-weight: 500; width: 28px; text-align: right; flex-shrink: 0; }
.cov-pct { font-family: var(--font-data); font-size: 11px; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; }

/* ── SLA panel ── */
.sla-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sla-stat { text-align: center; padding: 12px 8px; background: var(--surface2); border-radius: 6px; }
.sla-val { font-size: 32px; font-weight: 800; line-height: 1; }
.sla-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

/* ── Aging panel ── */
.aging-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.aging-label { font-size: 12px; font-weight: 600; width: 70px; flex-shrink: 0; font-family: var(--font-data); }
.aging-bar-bg { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.aging-bar-fill { height: 10px; border-radius: 5px; }
.aging-count { font-family: var(--font-data); font-size: 12px; font-weight: 600; width: 24px; text-align: right; }

/* ── Bottom row: breaches ── */
.breach-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.breach-table th { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 6px 10px; border-bottom: 2px solid var(--border); text-align: left; }
.breach-table td { padding: 8px 10px; border-bottom: 1px solid var(--surface2); }
.breach-table tr:last-child td { border-bottom: none; }
.breach-table tr:hover td { background: var(--surface2); }
.bd-pill { display: inline-block; font-family: var(--font-data); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
.bd-breach { background: rgba(220,38,38,0.1); color: #991B1B; border: 1px solid rgba(220,38,38,0.2); }
.bd-warn   { background: rgba(217,119,6,0.1); color: #92400E; border: 1px solid rgba(217,119,6,0.2); }

/* ── Badges ── */
.badge { display: inline-block; font-family: var(--font-data); font-size: 9px; padding: 2px 7px; border-radius: 3px; font-weight: 500; }
.badge-red    { background: rgba(220,38,38,0.09); color: #991B1B; border: 1px solid rgba(220,38,38,0.2); }
.badge-amber  { background: rgba(180,83,9,0.09);  color: #92400E; border: 1px solid rgba(180,83,9,0.2); }
.badge-blue   { background: rgba(37,99,235,0.09); color: #1E40AF; border: 1px solid rgba(37,99,235,0.2); }
.badge-green  { background: rgba(22,163,74,0.09); color: #86EFAC; border: 1px solid rgba(22,163,74,0.2); }
.badge-muted  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

/* ── Footer ── */
#footer { background: var(--surface); border-top: 1px solid var(--border); padding: 8px 32px; display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--muted); font-family: var(--font-data); flex-shrink: 0; }
#last-updated { }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Empty / loading ── */
.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div id="shell">

<!-- HEADER -->
<div id="header">
  <div>
    <div class="header-brand">DNV–BASTION COMPLIANCE <span>Sentinel 001 · Vanguard 02</span></div>
    <div style="font-size:12px;opacity:0.6;margin-top:2px;font-family:var(--font-data)">DNV-RU-UWT Pt.5 Ch.10 Sec.1 — Management Dashboard</div>
  </div>
  <div class="header-right">
    <div class="header-date" id="hdr-date">—</div>
    <div id="hdr-time" style="font-family:var(--font-data);margin-top:2px">—</div>
  </div>
</div>

<!-- NAV STRIP -->
<div id="nav-strip">
  <a href="/"        class="nav-btn">COORDINATOR</a>
  <a href="/docreq"  class="nav-btn">DOC REQUIREMENTS</a>
  <a href="/reports" class="nav-btn">REPORTS</a>
  <a href="/exec"    class="nav-btn active">EXEC DASHBOARD</a>
  <div class="nav-right">
    <button class="action-btn primary" onclick="window.location.href='/api/export/docreq-pdf'">&#8595; PDF REPORT</button>
    <button class="action-btn" id="send-digest-btn" onclick="sendDigest()">&#9993; SEND SLA DIGEST</button>
    <span id="digest-status" style="font-size:11px;color:var(--muted);font-family:var(--font-data)"></span>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="content">
  <div id="main-content"><div class="loading">Loading compliance data…</div></div>
</div>

<!-- FOOTER -->
<div id="footer">
  <div><span class="status-dot"></span>Live data from docreq.db · Auto-refreshes every 2 minutes</div>
  <div id="last-updated">—</div>
</div>

</div><!-- #shell -->

<script>
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt  = n => n === null || n === undefined ? '—' : String(n);

// ── Clock ──────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('hdr-date').textContent =
    now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
  document.getElementById('hdr-time').textContent =
    now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 30000);

// ── Color helpers ──────────────────────────────────────────────────
const COV_COLORS = {
  'MISSING':       '#EF4444',
  'Gap':           '#F59E0B',
  'Open Comments': '#F59E0B',
  'Answered':      '#3B82F6',
  'Submitted':     '#3B82F6',
  'DNV Reviewed':  '#22C55E',
  'Satisfied':     '#22C55E',
};

function covBadgeCls(s) {
  if (s==='MISSING') return 'badge-red';
  if (s==='Gap'||s==='Open Comments') return 'badge-amber';
  if (s==='Submitted'||s==='Answered') return 'badge-blue';
  if (s==='DNV Reviewed'||s==='Satisfied') return 'badge-green';
  return 'badge-muted';
}

// ── Render ─────────────────────────────────────────────────────────
function renderDashboard(m, summary) {
  const cov   = m.coverage || {};
  const aging = m.aging    || {};
  const total = m.total_requirements || 1;

  const reviewed  = (cov['DNV Reviewed']||0) + (cov['Satisfied']||0);
  const submitted = cov['Submitted'] || 0;
  const openC     = cov['Open Comments'] || 0;
  const gap       = cov['Gap'] || 0;
  const missing   = cov['MISSING'] || 0;
  const covPct    = total > 0 ? Math.round((reviewed + submitted) / total * 100) : 0;

  const agingColors = {
    '0-5 bd':  '#22C55E',
    '6-10 bd': '#F59E0B',
    '11-20 bd':'#EA580C',
    '20+ bd':  '#EF4444',
  };
  const maxAging = Math.max(1, ...Object.values(aging));

  const covOrder = [
    ['MISSING',       missing,   '#EF4444'],
    ['Gap',           gap,       '#F59E0B'],
    ['Open Comments', openC,     '#F59E0B'],
    ['Submitted',     submitted, '#3B82F6'],
    ['DNV Reviewed',  reviewed,  '#22C55E'],
  ];

  // Build breach/warning list from requirements data
  let breachRows = [];
  // We'll load those separately

  document.getElementById('main-content').innerHTML = `

  <!-- KPI ROW -->
  <div class="kpi-row">
    <div class="kpi-card" style="border-top-color:var(--blue)">
      <div class="kpi-value" style="color:var(--blue)">${total}</div>
      <div class="kpi-label">Requirements</div>
      <div class="kpi-sub">total DNV items</div>
    </div>
    <div class="kpi-card" style="border-top-color:${covPct>=80?'var(--green)':covPct>=50?'var(--amber)':'var(--red)'}">
      <div class="kpi-value" style="color:${covPct>=80?'var(--green)':covPct>=50?'var(--amber)':'var(--red)'}">${covPct}%</div>
      <div class="kpi-label">Coverage</div>
      <div class="kpi-sub">submitted + reviewed</div>
    </div>
    <div class="kpi-card" style="border-top-color:${openC>0?'var(--amber)':'var(--green)'}">
      <div class="kpi-value" style="color:${openC>0?'var(--amber)':'var(--green)'}">${openC}</div>
      <div class="kpi-label">Open Comments</div>
      <div class="kpi-sub">${m.open_threads||0} open threads</div>
    </div>
    <div class="kpi-card" style="border-top-color:${m.sla_breach>0?'var(--red)':'var(--green)'}">
      <div class="kpi-value" style="color:${m.sla_breach>0?'var(--red)':'var(--green)'}">${m.sla_breach||0}</div>
      <div class="kpi-label">SLA Breaches</div>
      <div class="kpi-sub">10bd threshold</div>
    </div>
    <div class="kpi-card" style="border-top-color:${m.sla_pct!==null?m.sla_pct>=80?'var(--green)':'var(--amber)':'var(--muted)'}">
      <div class="kpi-value" style="color:${m.sla_pct!==null?m.sla_pct>=80?'var(--green)':'var(--amber)':'var(--muted)'}">${m.sla_pct!==null?m.sla_pct+'%':'—'}</div>
      <div class="kpi-label">SLA On Time</div>
      <div class="kpi-sub">of responses</div>
    </div>
    <div class="kpi-card" style="border-top-color:${missing>0?'var(--red)':'var(--green)'}">
      <div class="kpi-value" style="color:${missing>0?'var(--red)':'var(--green)'}">${missing}</div>
      <div class="kpi-label">Missing</div>
      <div class="kpi-sub">no doc linked</div>
    </div>
  </div>

  <!-- MIDDLE ROW -->
  <div class="mid-row">

    <!-- Coverage breakdown -->
    <div class="panel">
      <div class="sec-title">Coverage Breakdown</div>
      ${covOrder.map(([label, count, color]) => `
      <div class="cov-row">
        <div class="cov-label" style="color:${color}">${label}</div>
        <div class="cov-bar-bg">
          <div class="cov-bar-fill" style="width:${Math.round(count/total*100)}%;background:${color}"></div>
        </div>
        <div class="cov-count" style="color:${color}">${count}</div>
        <div class="cov-pct">${Math.round(count/total*100)}%</div>
      </div>`).join('')}
    </div>

    <!-- SLA Performance -->
    <div class="panel">
      <div class="sec-title">SLA Performance — 10 Business Day Target</div>
      <div class="sla-grid">
        <div class="sla-stat">
          <div class="sla-val" style="color:${(m.sla_pct||0)>=80?'var(--green)':'var(--amber)'}">${m.sla_pct!==null&&m.sla_pct!==undefined?m.sla_pct+'%':'—'}</div>
          <div class="sla-lbl">Responses On Time</div>
        </div>
        <div class="sla-stat">
          <div class="sla-val" style="color:var(--blue)">${fmt(m.avg_response_bd)}${m.avg_response_bd!==null?'bd':''}</div>
          <div class="sla-lbl">Avg Response Time</div>
        </div>
        <div class="sla-stat">
          <div class="sla-val" style="color:${(m.sla_breach||0)>0?'var(--red)':'var(--muted)'}">${m.sla_breach||0}</div>
          <div class="sla-lbl">Breached</div>
        </div>
        <div class="sla-stat">
          <div class="sla-val" style="color:var(--green)">${m.sla_within_10bd||0}</div>
          <div class="sla-lbl">Within SLA</div>
        </div>
      </div>
    </div>

    <!-- Open thread aging -->
    <div class="panel">
      <div class="sec-title">Open Thread Aging</div>
      ${Object.entries(aging).map(([label, count]) => `
      <div class="aging-row">
        <div class="aging-label">${label}</div>
        <div class="aging-bar-bg">
          <div class="aging-bar-fill" style="width:${Math.round(count/maxAging*100)}%;background:${agingColors[label]||'var(--blue)'}"></div>
        </div>
        <div class="aging-count" style="color:${agingColors[label]||'var(--blue)'}">${count}</div>
      </div>`).join('')}
      <div style="margin-top:14px;font-size:11px;color:var(--muted)">
        ${m.open_threads||0} total open threads across ${total} requirements
      </div>
    </div>

  </div>

  <!-- BREACH / WARNING TABLE -->
  <div class="panel" id="breach-panel">
    <div class="sec-title">Open Threads — SLA Status</div>
    <div id="breach-table-container"><div class="loading" style="padding:20px">Loading…</div></div>
  </div>

  `;

  document.getElementById('last-updated').textContent =
    'Last updated: ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  loadBreachTable();
}

async function loadBreachTable() {
  try {
    const res  = await fetch('/api/docreq/requirements');
    const reqs = await res.json();

    let rows = [];
    for (const req of reqs) {
      for (const doc of req.documents || []) {
        for (const t of doc.threads || []) {
          if (t.disposition !== 'Open') continue;
          const bd = t.sla?.bd_open || 0;
          rows.push({
            item_number: req.item_number || '',
            dnv_code:    req.dnv_code || '',
            doc_number:  doc.doc_number || '',
            round:       t.round || 1,
            category:    t.category || '',
            assigned_to: t.assigned_to || 'Unassigned',
            bd_open:     bd,
            received:    t.dnv_comment_date || '',
            disposition: t.disposition,
          });
        }
      }
    }

    rows.sort((a,b) => b.bd_open - a.bd_open);

    if (!rows.length) {
      document.getElementById('breach-table-container').innerHTML =
        '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No open comment threads.</div>';
      return;
    }

    document.getElementById('breach-table-container').innerHTML = `
    <table class="breach-table">
      <thead>
        <tr>
          <th>Req #</th>
          <th>DNV Code</th>
          <th>Doc Number</th>
          <th>Round</th>
          <th>Category</th>
          <th>Assigned To</th>
          <th>Received</th>
          <th>Age</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
        <tr>
          <td><strong>${esc(r.item_number)}</strong></td>
          <td style="font-family:var(--font-data);font-size:11px;color:var(--blue)">${esc(r.dnv_code)}</td>
          <td style="font-family:var(--font-data);font-size:11px">${esc(r.doc_number)}</td>
          <td style="text-align:center">${r.round}</td>
          <td><span class="badge badge-muted">${esc(r.category)}</span></td>
          <td>${esc(r.assigned_to)}</td>
          <td style="font-family:var(--font-data);font-size:11px;color:var(--muted)">${esc(r.received)}</td>
          <td>
            <span class="bd-pill ${r.bd_open>=10?'bd-breach':'bd-warn'}">${r.bd_open}bd</span>
          </td>
          <td>
            <span class="badge ${r.bd_open>=10?'badge-red':'badge-amber'}">
              ${r.bd_open>=10?'BREACH':'WARNING'}
            </span>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  } catch(e) {
    document.getElementById('breach-table-container').innerHTML =
      `<div style="padding:20px;color:var(--red);font-size:12px">Error: ${esc(String(e))}</div>`;
  }
}

// ── Send SLA Digest ────────────────────────────────────────────────
async function sendDigest() {
  const btn  = document.getElementById('send-digest-btn');
  const stat = document.getElementById('digest-status');
  btn.disabled = true;
  stat.textContent = 'Sending…';
  stat.style.color = 'var(--muted)';
  try {
    const res  = await fetch('/api/admin/sla-digest', { method: 'POST' });
    const data = await res.json();
    if (data.status === 'sent') {
      stat.textContent = '✓ Sent';
      stat.style.color = 'var(--green)';
    } else if (data.status === 'no_url') {
      stat.textContent = '⚠ No webhook URL set in config.json';
      stat.style.color = 'var(--amber)';
    } else {
      stat.textContent = data.status || 'Unknown result';
      stat.style.color = 'var(--muted)';
    }
  } catch(e) {
    stat.textContent = 'Error — check console';
    stat.style.color = 'var(--red)';
  }
  btn.disabled = false;
  setTimeout(() => { stat.textContent = ''; }, 6000);
}

// ── Boot ───────────────────────────────────────────────────────────
async function boot() {
  try {
    const [mRes, sRes] = await Promise.all([
      fetch('/api/docreq/metrics'),
      fetch('/api/docreq/summary'),
    ]);
    const [metrics, summary] = await Promise.all([mRes.json(), sRes.json()]);
    renderDashboard(metrics, summary);
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading" style="color:var(--red)">Error loading data: ${esc(String(e))}<br><br>
       Make sure the Flask server is running and navigate to <a href="/docreq">/docreq</a> first to seed the database.</div>`;
  }
}

boot();
</script>
<script src="/static/auth.js"></script>
</body>
</html>
